name: lesson17-ci

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  TF_VERSION: "1.8.5"
  TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  terraform_validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Fmt Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  ansible_lint:
    name: Ansible Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          python3 -m pip install --upgrade pip
          pip install ansible ansible-lint

      - name: Run ansible-lint
        run: ansible-lint ansible/tasks/main.yml

  helm_lint:
    name: Helm Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm Lint
        run: helm lint helm-chart

      - name: Helm Template
        run: helm template demo-release helm-chart > /tmp/helm-rendered.yaml

  k8s_validate:
    name: Kubernetes Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -L -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Validate manifests
        run: kubeconform -strict -summary k8s-manifests/deployment.yaml

  security_scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs:
      - terraform_validate
      - ansible_lint
      - helm_lint
      - k8s_validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-results.json
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload security scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: trivy-results.json

      - name: Detect critical vulnerabilities
        id: critical_check
        run: |
          CRITICAL_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json)
          echo "critical_count=$CRITICAL_COUNT" >> $GITHUB_OUTPUT
          echo "Critical vulnerabilities: $CRITICAL_COUNT"

      - name: Notify about critical vulnerabilities
        if: steps.critical_check.outputs.critical_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const criticalCount = "${{ steps.critical_check.outputs.critical_count }}";
            const body = `
            Security scan detected **${criticalCount} CRITICAL vulnerabilities**.

            Workflow: ${context.workflow}
            Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
            `;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Critical vulnerabilities detected in ${context.ref}`,
              body
            });

  terraform_apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs:
      - security_scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init with remote state
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=lesson17/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}"

      - name: Terraform Apply
        run: terraform apply -auto-approve
